# This workflow will build a Java project with mave

name: Incident Reporting System Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 8
      uses: actions/setup-java@v5
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn -B package --file pom.xml
